<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Jornada de viagens</title>
  </head>
  <body>
    <header>
      <a class="logo" href="index.html" title="Voltar para a página inicial">
        <img
          class="img-mobile"
          src="./img/Logo-provisória-branca 1.png"
          alt="Logo da jornada de viagens"
        />
        <img
          class="img-desktop"
          src="./img/Logo-provisória-branca desktop.png"
          alt="Logo da jornada de viagens"
        />
      </a>
      <div class="navigation-menu">
        <label for="menu"
          >Menu
          <img src="./img/menu.png" alt="Menu de navegação" />
        </label>
        <input type="checkbox" id="menu" hidden />
        <nav>
          <ul class="link-list">
            <li><a href="blog.html" target="_blank">Blog</a></li>
            <li>
              <a href="pacotes.html" target="_blank">Pacotes de viagem</a>
            </li>
            <li><a href="contato.html" target="_blank">Contato</a></li>
          </ul>
        </nav>
      </div>

    <section class="hero">
      <div class="hero-img"></div>
      <h2>
        Somos uma agência apaixonada por criar viagens inesquecíveis. Do destino
        à seleção das atividades, cuidamos de todos os detalhes para que você
        aproveite ao máximo cada momento da sua jornada!
      </h2>
    </section>
    <section class="offers">
      <div class="section-title">
        <h2>Ofertas da semana</h2>
        <hr />
      </div>
      <div class="offer-cards">
        <article class="card">
          <header>
            <p>HOTEL+AÉREO</p>
            <h3>
              Japão <br />
              <span>$ 4.500,00</span>
            </h3>
          </header>
          <footer>
            <a href="#" class="button">Ver detalhes</a>
          </footer>
        </article>
      </div>
    </section>
